<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link

<body>

    <main>
        <section class="hero-section">
            <div class="hero-img">
                <img src="images/Group 2.png" alt="">

            <h2>New Foodie Collection</h2>
            <div class="img-container">
                <img src="images/john-fornander-VedLcUfLi74-unsplash 1.png" alt="">
            </div>
        </section>
        <section id="deal-of-the-day" class="section">
            <h2>Deal of the Day</h2>
            <div class="img-container">
                <img src="images/sk-CK6tjAIMJWM-unsplash (1) 1.png" alt="">

        <h3 class="go-up"><a href="#">GO to Top</a></h3>
