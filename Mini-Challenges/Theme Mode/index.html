<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change theme</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body class="body">
    <main>
        <div class="dark-theme">

            <p>Dark Mode</p>
            <input class="screen-dark-mode" type="checkbox">
        </div>
        <h1>The entire page color theme is controlled using css and javascript</h1>
        <div class="container-dark-mode">
            <p>Contained Dark mode</p>
            <input class="box" type="checkbox">
        </div>
        <h1 class="container-text">The container scheme is by controlled only css</h1>
    </main>
</body>

</html>
